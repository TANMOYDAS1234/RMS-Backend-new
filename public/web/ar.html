<!doctype html>
<!--
  AR / 3D Viewer page.

  Customer-facing: opened in a new tab from a menu tile in the Flutter
  Web QR ordering screen. Powered by Google's <model-viewer> — handles
  Scene Viewer (Android) and Quick Look (iOS, requires a USDZ) natively.

  Query params:
    model    = path to the GLB (default /models/pizza.glb — the demo asset)
    iosModel = path to the USDZ for iOS AR Quick Look. If omitted, we derive
               it from `model` by swapping the extension to .usdz. If the
               file doesn't exist iOS just falls back to in-page 3D — the
               drag-to-rotate experience still works either way.
    name     = item display name (shown in the title bar)
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>DINE OPS — AR Preview</title>
  <script type="module"
    src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0; height: 100%; overflow: hidden;
      background: radial-gradient(circle at 30% 20%, #2a1810, #0d0805 60%, #000 100%);
      color: #f3e8d8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px;
      background: linear-gradient(180deg, rgba(0,0,0,0.55) 0%, transparent 100%);
    }
    header h1 {
      margin: 0; font-size: 16px; font-weight: 800; letter-spacing: 0.5px;
      text-overflow: ellipsis; overflow: hidden; white-space: nowrap; max-width: 70vw;
    }
    .close {
      color: #f3e8d8; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      width: 36px; height: 36px; border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; text-decoration: none; cursor: pointer;
    }
    model-viewer {
      width: 100vw; height: 100vh; background: transparent;
      --poster-color: transparent;
      opacity: 0; transform: scale(0.4) rotate(-360deg);
      animation: appear 1.4s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards;
      filter: drop-shadow(0 30px 60px rgba(200, 123, 58, 0.4));
      position: relative; z-index: 2;
    }
    @keyframes appear {
      0%   { opacity: 0; transform: scale(0.3) rotate(-360deg); filter: blur(30px) brightness(0.3); }
      40%  { opacity: 1; filter: blur(6px) brightness(1.4); }
      75%  { transform: scale(1.08) rotate(8deg); filter: blur(0) brightness(1.2); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); filter: blur(0) brightness(1); }
    }
    /* Drifting copper-steam blobs — three lazy-floating radial gradients. */
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
    .particles span {
      position: absolute; border-radius: 50%;
      background: radial-gradient(circle, rgba(200,123,58,0.35) 0%, rgba(200,123,58,0) 70%);
      filter: blur(6px);
      animation: drift 14s ease-in-out infinite alternate;
    }
    .particles span:nth-child(1) { width: 220px; height: 220px; top: 12%; left: 8%;  animation-delay: 0s; }
    .particles span:nth-child(2) { width: 180px; height: 180px; top: 65%; left: 75%; animation-delay: -4s; }
    .particles span:nth-child(3) { width: 140px; height: 140px; top: 78%; left: 12%; animation-delay: -8s; }
    .particles span:nth-child(4) { width: 160px; height: 160px; top: 22%; left: 70%; animation-delay: -11s; }
    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); opacity: 0.6; }
      50%  { transform: translate(40px, -30px) scale(1.2); opacity: 1; }
      100% { transform: translate(-30px, 35px) scale(0.9); opacity: 0.7; }
    }
    /* Slow-rotating conic-gradient halo behind the model. */
    .halo { position: fixed; inset: 0; pointer-events: none; z-index: 1;
            display: flex; align-items: center; justify-content: center; }
    .halo::before {
      content: ''; width: 70vmin; height: 70vmin; border-radius: 50%;
      background: conic-gradient(from 0deg,
        rgba(200,123,58,0) 0deg,
        rgba(200,123,58,0.35) 60deg,
        rgba(232, 162, 104, 0.5) 120deg,
        rgba(200,123,58,0) 180deg,
        rgba(232, 162, 104, 0.45) 280deg,
        rgba(200,123,58,0) 360deg);
      filter: blur(40px);
      animation: spin 10s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Custom AR button overlay — model-viewer's default is fine, but
       we recolor it to match the dine-ops palette. */
    .ar-button {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(135deg, #c87b3a, #a85a20);
      color: #fff; font-weight: 800; font-size: 14px; letter-spacing: 1px;
      padding: 14px 24px; border-radius: 28px; border: none;
      box-shadow: 0 10px 28px rgba(200, 123, 58, 0.45);
      cursor: pointer; z-index: 5;
      display: flex; align-items: center; gap: 8px;
    }
    .ar-button:active { transform: translateX(-50%) scale(0.97); }
    .hint {
      position: fixed; top: 64px; left: 50%; transform: translateX(-50%);
      font-size: 12px; color: rgba(243, 232, 216, 0.7);
      background: rgba(0,0,0,0.4); padding: 6px 12px; border-radius: 12px;
      backdrop-filter: blur(8px);
      animation: fadeIn 1s ease 1.2s both;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
  <header>
    <h1 id="title">3D Preview</h1>
    <a class="close" href="javascript:window.close();window.history.length>1?window.history.back():null;">×</a>
  </header>

  <div class="particles"><span></span><span></span><span></span><span></span></div>
  <div class="halo"></div>

  <div class="hint">Drag to rotate · Pinch to zoom · Tap "View in your space"</div>

  <model-viewer
    id="mv"
    src="/models/pizza.glb"
    ios-src="/models/pizza.usdz"
    alt="3D model"
    camera-controls
    auto-rotate
    ar
    ar-modes="webxr scene-viewer quick-look"
    shadow-intensity="1.2"
    exposure="1.1"
    environment-image="neutral"
    camera-orbit="0deg 75deg 110%"
    field-of-view="30deg">
    <button slot="ar-button" class="ar-button">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M3 7v10l9 5 9-5V7l-9-5-9 5z" />
        <path d="M3 7l9 5 9-5" />
        <path d="M12 12v10" />
      </svg>
      VIEW IN YOUR SPACE
    </button>
  </model-viewer>

  <script>
    // Resolve params and apply.
    const params = new URLSearchParams(window.location.search);
    const model = params.get('model') || '/models/pizza.glb';
    // If the caller doesn't pass an iOS-specific URL, derive one by
    // swapping .glb → .usdz on the same path. Apple's AR Quick Look
    // requires USDZ; if the file isn't there the AR button just
    // gracefully degrades to in-page 3D on iPhones.
    const iosModel = params.get('iosModel') ||
                     model.replace(/\.(glb|gltf)$/i, '.usdz');
    const name = params.get('name') || '3D Preview';
    document.getElementById('title').textContent = name;
    const mv = document.getElementById('mv');
    mv.setAttribute('src', model);
    mv.setAttribute('ios-src', iosModel);
    // Slight extra entrance kick once the model is loaded.
    mv.addEventListener('load', () => {
      mv.style.animation = 'none';
      // Force reflow then re-apply the entrance for the loaded geometry.
      void mv.offsetWidth;
      mv.style.animation = 'appear 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards';
    });
  </script>
</body>
</html>
